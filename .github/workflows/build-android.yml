name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      profile:
        description: '编译配置（preview=内测APK / production=正式APK）'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build-android:
    name: 编译 Android APK
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置 Java（Android 构建需要）
      - name: 配置 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 设置 Node.js
      - name: 配置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. 安装 pnpm（从 package.json packageManager 字段自动读取版本）
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      # 5. 安装依赖
      - name: 安装项目依赖
        run: |
          echo "module.exports = { hooks: { readPackage: (pkg) => pkg } };" > .pnpmfile.cjs
          pnpm install --no-frozen-lockfile

      # 6. 安装 EAS CLI
      - name: 安装 EAS CLI
        run: npm install -g eas-cli

      # 7. 登录 Expo
      - name: 登录 Expo
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 8. 本地编译 Android APK（--local 在 runner 上运行，日志完全可见）
      - name: EAS Build Android APK（本地）
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "使用编译配置: $PROFILE"
          eas build --platform android --profile "$PROFILE" --local --non-interactive --output ./car-screen-cast.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 9. 上传 APK 到 GitHub Artifacts
      - name: 上传 APK 到 Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: car-screen-cast-apk
          path: '*.apk'
          if-no-files-found: warn
          retention-days: 30
